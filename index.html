<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroCommand: Archipelago Conflict</title>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="cam-help">WASD / Arrows to Pan</div>
    <div id="overlay"><h1 id="overlay-msg">VICTORY</h1></div>
    
    <!-- Main Menu -->
    <div id="main-menu" class="menu-screen">
        <div class="menu-title">AeroCommand</div>
        <div class="menu-btn" onclick="showSetup()">PLAY</div>
    </div>

    <!-- Setup Menu -->
    <div id="setup-menu" class="menu-screen" style="display:none;">
        <div class="menu-title" style="font-size: 48px;">Mission Setup</div>
        
        <div class="setup-group">
            <span class="setup-label">Map Size</span>
            <select id="map-size">
                <option value="1">Small (1x)</option>
                <option value="2" selected>Medium (2x)</option>
                <option value="3">Large (3x)</option>
            </select>
        </div>
        <div class="setup-group">
            <span class="setup-label">Terrain Type</span>
            <select id="map-type">
                <option value="ARCHIPELAGO">Archipelago (Sea)</option>
                <option value="LAND">Continental (Land)</option>
            </select>
        </div>
        <div class="setup-group">
            <span class="setup-label">Island/Base Size</span>
            <select id="island-size">
                <option value="30">Small</option>
                <option value="50" selected>Medium</option>
                <option value="70">Large</option>
            </select>
        </div>
        <div class="setup-group">
            <span class="setup-label">Game Mode</span>
            <select id="mode-select">
                <option value="player">Player vs AI</option>
                <option value="spectator">Spectator (AI vs AI)</option>
            </select>
        </div>
        
        <div class="menu-btn" style="font-size: 18px; width: 200px; padding: 10px;" onclick="randomizeMap()">Randomize Map</div>
        <div class="menu-btn" onclick="startGame()">START MISSION</div>
        <div class="menu-btn" style="font-size: 16px; width: 150px; padding: 10px;" onclick="showMainMenu()">Back</div>
    </div>

    <!-- Loadout Modal -->
    <div id="loadout-modal" class="modal">
        <div class="modal-header">
            <div id="loadout-title" class="modal-title">Configuration</div>
            <button class="btn-close" onclick="closeModal('loadout-modal')">X</button>
        </div>
        <div id="plane-schematic">
            <div class="schematic-body">
                <div class="schematic-wing"></div><div class="schematic-wing right"></div>
                <div class="schematic-tail"></div><div class="schematic-rotor" id="rotor-visual"></div>
            </div>
        </div>
        <div id="weapon-selector"></div>
    </div>

    <!-- Research Modal -->
    <div id="research-modal" class="modal">
        <div class="modal-header">
            <div class="modal-title">R&D Lab</div>
            <div id="research-money" style="color: #ffd700; font-weight: bold; margin-right: 20px;"></div>
            <button class="btn-close" onclick="closeModal('research-modal')">X</button>
        </div>
        <div id="research-tree">
            <!-- Injected by JS -->
        </div>
    </div>

    <div id="ui-layer">
        <div class="panel" id="info-panel">
            <h3>Status</h3>
            <div class="stat-row"><span>Money:</span> <span id="money-display" class="res-text">$0</span></div>
            <div class="stat-row"><span>Units:</span> <span id="pop-display">0/50</span></div>
            <hr style="width:100%; border:0; border-top:1px solid #555; margin: 8px 0;">
            <div id="selection-info"><p>Nothing Selected</p></div>
        </div>
        <div class="panel" id="controls-panel">
            <button id="btn-edit-loadout" class="btn-toggle" onclick="toggleEditMode()">Loadout</button>
            <button class="btn-toggle" onclick="openResearch()">Research</button>
            <button id="btn-zones" class="btn-toggle" onclick="toggleZones()">Zones</button>
        </div>
        <div class="panel" id="zone-panel">
            <div class="btn-zone" onclick="setZoneMode('CAP')" id="btn-zone-cap" style="color:#4488FF; border-color:#4488FF">CAP</div>
            <div class="btn-zone" onclick="setZoneMode('CAS')" id="btn-zone-cas" style="color:#44FF44; border-color:#44FF44">CAS</div>
            <div class="btn-zone" onclick="setZoneMode('STRIKE')" id="btn-zone-strike" style="color:#FF4444; border-color:#FF4444">STRIKE</div>
            <div class="btn-zone" onclick="clearZones()" style="margin-top:5px; color:#fff;">CLEAR ALL</div>
        </div>
        <div class="panel" id="build-panel"></div>
    </div>
    <div id="tooltip"></div>
</div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/game.js"></script>
</body>
</html>
